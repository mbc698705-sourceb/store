<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر الهدايا</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

header{
background:#ff7aa2;
color:white;
padding:15px;
font-size:22px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:200px;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
background:#25D366;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<header>
متجر شغف للهدايا
</header>

<input type="file" id="file">
<button onclick="upload()">رفع صورة</button>

<div class="products" id="products"></div>

<script>

function upload(){

const file=document.getElementById("file").files[0];

const data=new FormData();

data.append("file",file);
data.append("upload_preset","store_upload");

fetch("https://api.cloudinary.com/v1_1/dtaobisnd/image/upload",{
method:"POST",
body:data
})
.then(res=>res.json())
.then(data=>{

addProduct(data.secure_url);

});

}

function addProduct(url){

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=url;

const btn=document.createElement("button");
btn.innerText="اطلب عبر واتساب";

btn.onclick=function(){
window.open("https://wa.me/9647732300034");
}

card.appendChild(img);
card.appendChild(btn);

document.getElementById("products").appendChild(card);

}

</script>

</body>
</html>
